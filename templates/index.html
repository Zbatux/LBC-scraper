<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LBC Scraper — Annonces</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #f0f2f5;
      color: #1a1a2e;
    }

    /* ── Header ──────────────────────────────────────────────── */
    header {
      background: #1a1a2e;
      color: #fff;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 16px; font-weight: 600; }
    #counter { font-size: 12px; color: #aab; margin-left: auto; }

    /* ── Filters ─────────────────────────────────────────────── */
    #filters {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 10px 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }
    #filters label { display: flex; align-items: center; gap: 5px; font-weight: 500; }
    #filters input[type=number], #filters input[type=text] {
      width: 80px; padding: 4px 6px; border: 1px solid #cbd5e1;
      border-radius: 4px; font-size: 12px;
    }
    #filters input[type=text] { width: 70px; }
    #filters select {
      padding: 4px 6px; border: 1px solid #cbd5e1;
      border-radius: 4px; font-size: 12px; cursor: pointer;
    }
    .filter-sep { color: #cbd5e1; }
    #resetFilters {
      margin-left: auto;
      padding: 4px 10px; background: #f1f5f9; border: 1px solid #cbd5e1;
      border-radius: 4px; cursor: pointer; font-size: 12px;
    }
    #resetFilters:hover { background: #e2e8f0; }

    /* ── Bulk toolbar ────────────────────────────────────────── */
    #toolbar {
      display: none;
      background: #1e40af;
      color: #fff;
      padding: 8px 20px;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    #toolbar.visible { display: flex; }
    #toolbar span { font-weight: 600; margin-right: 4px; }
    .tb-btn {
      padding: 5px 12px; border: none; border-radius: 4px;
      cursor: pointer; font-size: 12px; font-weight: 600;
    }
    #btnDelete    { background: #dc2626; color: #fff; }
    #btnDelete:hover { background: #b91c1c; }
    #btnOpenLinks { background: #059669; color: #fff; }
    #btnOpenLinks:hover { background: #047857; }
    #toggleGroup  { display: flex; align-items: center; gap: 8px; margin-left: 12px; flex-wrap: wrap; }
    .toggle-cb-label {
      display: flex; align-items: center; gap: 4px;
      background: rgba(255,255,255,.15); border-radius: 4px;
      padding: 3px 8px; cursor: pointer; font-size: 12px; user-select: none;
    }
    .toggle-cb-label input { cursor: pointer; }
    .toggle-cb-label:has(input:checked) { background: rgba(255,255,255,.35); font-weight: 700; }
    #btnToggleOn  { background: #16a34a; color: #fff; }
    #btnToggleOff { background: #9ca3af; color: #fff; }
    #btnToggleOn:hover  { background: #15803d; }
    #btnToggleOff:hover { background: #6b7280; }

    /* ── Table wrapper ───────────────────────────────────────── */
    #tableWrap {
      overflow-x: auto;
      padding: 16px 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    thead tr {
      background: #1a1a2e;
      color: #fff;
    }
    thead th {
      padding: 9px 8px;
      text-align: left;
      white-space: nowrap;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      user-select: none;
    }
    thead th.sortable { cursor: pointer; }
    thead th.sortable:hover { background: #2d2d4e; }
    thead th.sorted-asc::after  { content: " ▲"; }
    thead th.sorted-desc::after { content: " ▼"; }

    tbody tr { border-bottom: 1px solid #f1f5f9; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }
    tbody tr.nogo-row { opacity: .45; }
    tbody tr.selected { background: #eff6ff !important; }

    td { padding: 7px 8px; vertical-align: middle; }
    td.titre-cell {
      max-width: 240px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    td.lien-cell a {
      color: #2563eb; text-decoration: none; font-size: 11px;
    }
    td.lien-cell a:hover { text-decoration: underline; }

    /* boolean badge */
    .badge {
      display: inline-block; padding: 2px 7px;
      border-radius: 10px; font-size: 10px; font-weight: 700;
    }
    .badge-on  { background: #dcfce7; color: #166534; }
    .badge-off { background: #f1f5f9; color: #64748b; }
    .badge-null { background: #fff3cd; color: #92400e; }

    /* status badge */
    .status-badge {
      display: inline-block; padding: 2px 7px;
      border-radius: 10px; font-size: 10px; font-weight: 700;
      white-space: nowrap;
    }
    .status-new       { background: #dcfce7; color: #166534; }
    .status-changed   { background: #fef3c7; color: #92400e; }
    .status-reposted  { background: #dbeafe; color: #1e40af; }
    .status-unchanged { background: #f1f5f9; color: #94a3b8; font-weight: 400; }

    /* note inline edit */
    .note-cell {
      text-align: center; cursor: pointer; min-width: 44px;
    }
    .note-val {
      display: inline-block; width: 28px; height: 24px; line-height: 24px;
      border-radius: 50%; font-weight: 700; font-size: 12px;
      background: #e0e7ff; color: #3730a3; text-align: center;
    }
    .note-empty { color: #cbd5e1; font-size: 11px; }
    .note-input {
      width: 44px; padding: 2px 4px; border: 2px solid #6366f1;
      border-radius: 4px; font-size: 12px; text-align: center;
    }

    /* nogo badge (same as other boolean columns) */
    .nogo-cell { text-align: center; }

    /* row checkbox */
    .sel-cell { text-align: center; width: 32px; }

    /* empty state */
    #emptyState {
      text-align: center; padding: 40px; color: #94a3b8; display: none;
    }

    /* loading */
    #loading {
      text-align: center; padding: 40px; color: #64748b;
    }

    /* ── History modal ────────────────────────────────────────── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, .5);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
    }
    .modal-dialog {
      background: #fff; border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,.25);
      width: 90%; max-width: 860px; max-height: 80vh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px;
      background: #1a1a2e; color: #fff;
      font-size: 14px; font-weight: 600;
      flex-shrink: 0;
    }
    .modal-header button {
      background: none; border: none; color: #fff;
      font-size: 18px; cursor: pointer; line-height: 1;
    }
    .modal-header button:hover { color: #aab; }
    .modal-body {
      overflow-y: auto; padding: 16px;
      flex: 1;
    }
    .history-table {
      width: 100%; border-collapse: collapse; font-size: 12px;
    }
    .history-table th {
      background: #f1f5f9; padding: 7px 8px;
      text-align: left; font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .04em;
      white-space: nowrap; border-bottom: 2px solid #e2e8f0;
    }
    .history-table td {
      padding: 6px 8px; border-bottom: 1px solid #f1f5f9;
      vertical-align: middle;
    }
    .history-table tr:last-child td { border-bottom: none; }
    .cell-changed {
      background: #fef3c7; color: #92400e; font-weight: 700;
    }

    /* history trigger button */
    .hist-btn {
      padding: 3px 8px; background: #e0e7ff; border: none;
      border-radius: 4px; font-size: 11px; cursor: pointer; white-space: nowrap;
    }
    .hist-btn:hover { background: #c7d2fe; }
  </style>
</head>
<body>

<header>
  <h1>LBC Scraper — Annonces</h1>
  <span id="counter">Chargement…</span>
</header>

<!-- Filters -->
<div id="filters">
  <label>
    <input type="checkbox" id="hideNogo" />
    Masquer nogo
  </label>
  <span class="filter-sep">|</span>
  <label>Prix&nbsp;€ <input type="number" id="fPrixMin" placeholder="min" /></label>
  <label>–<input type="number" id="fPrixMax" placeholder="max" /></label>
  <span class="filter-sep">|</span>
  <label>Superficie m² <input type="number" id="fSurfMin" placeholder="min" /></label>
  <label>–<input type="number" id="fSurfMax" placeholder="max" /></label>
  <span class="filter-sep">|</span>
  <label>€/m² <input type="number" id="fPm2Min" placeholder="min" /></label>
  <label>–<input type="number" id="fPm2Max" placeholder="max" /></label>
  <span class="filter-sep">|</span>
  <label>Trajet max <input type="text" id="fTrajetMax" placeholder="ex: 1h 30" /></label>
  <span class="filter-sep">|</span>
  <label>Viabilisé
    <select id="fViabilise">
      <option value="">Tous</option>
      <option value="1">Oui</option>
      <option value="0">Non</option>
      <option value="null">?</option>
    </select>
  </label>
  <label>Part.&nbsp;const.
    <select id="fConstruct">
      <option value="">Tous</option>
      <option value="1">Oui</option>
      <option value="0">Non</option>
      <option value="null">?</option>
    </select>
  </label>
  <label>Part.&nbsp;agri.
    <select id="fAgricole">
      <option value="">Tous</option>
      <option value="1">Oui</option>
      <option value="0">Non</option>
      <option value="null">?</option>
    </select>
  </label>
  <span class="filter-sep">|</span>
  <label>Note min <input type="number" id="fNoteMin" placeholder="1–10" min="1" max="10" /></label>
  <span class="filter-sep">|</span>
  <label>Statut
    <select id="fStatus">
      <option value="">Tous</option>
      <option value="new">Nouveaux</option>
      <option value="price_changed">Prix changé</option>
      <option value="reposted">Reposté</option>
      <option value="unchanged">Inchangé</option>
    </select>
  </label>
  <button id="resetFilters">Réinitialiser</button>
</div>

<!-- Bulk toolbar -->
<div id="toolbar">
  <span id="selCount">0 sélectionnée(s)</span>
  <button class="tb-btn" id="btnDelete">🗑 Supprimer</button>
  <button class="tb-btn" id="btnOpenLinks">🔗 Ouvrir liens</button>
  <div id="toggleGroup">
    <label class="toggle-cb-label"><input type="checkbox" class="toggle-col" value="nogo" /> Nogo</label>
    <label class="toggle-cb-label"><input type="checkbox" class="toggle-col" value="viabilise" /> Viabilisé</label>
    <label class="toggle-cb-label"><input type="checkbox" class="toggle-col" value="partiellement_constructible" /> Part. const.</label>
    <label class="toggle-cb-label"><input type="checkbox" class="toggle-col" value="partiellement_agricole" /> Part. agri.</label>
    <button class="tb-btn" id="btnToggleOn">→ Oui</button>
    <button class="tb-btn" id="btnToggleOff">→ Non</button>
  </div>
</div>

<!-- Table -->
<div id="tableWrap">
  <div id="loading">Chargement des annonces…</div>
  <div id="emptyState">Aucune annonce ne correspond aux filtres.</div>
  <table id="mainTable" style="display:none">
    <thead>
      <tr>
        <th class="sel-cell"><input type="checkbox" id="selectAll" /></th>
        <th class="sortable" data-col="status">Statut</th>
        <th class="sortable" data-col="first_seen">1ère vue</th>
        <th class="sortable" data-col="date_publication">Publié le</th>
        <th class="sortable" data-col="titre">Titre</th>
        <th class="sortable" data-col="prix">Prix&nbsp;€</th>
        <th class="sortable" data-col="superficie">Surf.&nbsp;m²</th>
        <th class="sortable" data-col="prix_m2">€/m²</th>
        <th class="sortable" data-col="trajet">Trajet</th>
        <th class="sortable" data-col="viabilise">Viabilisé</th>
        <th class="sortable" data-col="partiellement_constructible">Part.&nbsp;const.</th>
        <th class="sortable" data-col="partiellement_agricole">Part.&nbsp;agri.</th>
        <th class="sortable" data-col="emprise_sol">Emprise&nbsp;%</th>
        <th class="sortable" data-col="note">Note</th>
        <th class="sortable" data-col="nogo">Nogo</th>
        <th>Lien</th>
        <th>Historique</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- History modal -->
<div id="historyModal" class="modal-overlay" style="display:none" role="dialog" aria-modal="true" aria-label="Historique de l'annonce">
  <div class="modal-dialog">
    <div class="modal-header">
      <span id="modalTitle">Historique</span>
      <button id="modalClose" aria-label="Fermer">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
  // ── State ────────────────────────────────────────────────────
  let allData = [];
  let sortCol = null;
  let sortDir = 1; // 1=asc, -1=desc

  // ── Helpers ──────────────────────────────────────────────────
  const fmt = (v, dec = 0) =>
    v == null ? "—" : Number(v).toLocaleString("fr-FR", { maximumFractionDigits: dec });

  function badge(val) {
    if (val === 1)    return `<span class="badge badge-on">Oui</span>`;
    if (val === 0)    return `<span class="badge badge-off">Non</span>`;
    return `<span class="badge badge-null">?</span>`;
  }

  function statusBadge(status) {
    if (status === 'new')           return `<span class="status-badge status-new">nouveau</span>`;
    if (status === 'price_changed') return `<span class="status-badge status-changed">prix changé</span>`;
    if (status === 'reposted')      return `<span class="status-badge status-reposted">reposté</span>`;
    return `<span class="status-badge status-unchanged">—</span>`; // unchanged, null, or unknown
  }

  function fmtDate(iso) {
    if (!iso) return "—";
    // Date-only strings (YYYY-MM-DD) are UTC by spec; append time to force local-time parsing
    const normalized = /^\d{4}-\d{2}-\d{2}$/.test(iso) ? iso + "T00:00:00" : iso;
    const d = new Date(normalized);
    if (isNaN(d)) return "—";
    return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric" });
  }

  function fmtDateTime(iso) {
    if (!iso) return "—";
    const d = new Date(iso);
    if (isNaN(d)) return "—";
    return d.toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", year: "numeric" })
      + " " + d.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" });
  }

  /** Convert "1h 23min" → minutes (for sorting/filtering) */
  function trajetToMin(t) {
    if (!t || t === "N/A") return Infinity;
    let m = 0;
    const h = t.match(/(\d+)h/);   if (h) m += parseInt(h[1]) * 60;
    const mn = t.match(/(\d+)min/); if (mn) m += parseInt(mn[1]);
    return m;
  }

  // ── Fetch data ───────────────────────────────────────────────
  async function loadData() {
    const res = await fetch("/api/annonces");
    allData = await res.json();
    document.getElementById("loading").style.display = "none";
    document.getElementById("mainTable").style.display = "";
    render();
  }

  // ── Filtering ────────────────────────────────────────────────
  function parseBoolFilter(id) {
    const v = document.getElementById(id).value;
    if (v === "") return null;        // Tous
    if (v === "null") return "null";  // ?
    return parseInt(v);               // 0 ou 1
  }

  function matchBool(filterVal, colVal) {
    if (filterVal === null) return true;
    if (filterVal === "null") return colVal == null;
    return colVal === filterVal;
  }

  function getFiltered() {
    const hideNogo   = document.getElementById("hideNogo").checked;
    const prixMin    = parseFloat(document.getElementById("fPrixMin").value)   || null;
    const prixMax    = parseFloat(document.getElementById("fPrixMax").value)   || null;
    const surfMin    = parseFloat(document.getElementById("fSurfMin").value)   || null;
    const surfMax    = parseFloat(document.getElementById("fSurfMax").value)   || null;
    const pm2Min     = parseFloat(document.getElementById("fPm2Min").value)    || null;
    const pm2Max     = parseFloat(document.getElementById("fPm2Max").value)    || null;
    const trajetMax  = document.getElementById("fTrajetMax").value.trim()      || null;
    const noteMin    = parseInt(document.getElementById("fNoteMin").value)     || null;
    const trajetMaxMin = trajetMax ? trajetToMin(trajetMax) : null;
    const fViab      = parseBoolFilter("fViabilise");
    const fConst     = parseBoolFilter("fConstruct");
    const fAgri      = parseBoolFilter("fAgricole");
    const fStatus    = document.getElementById("fStatus").value;

    return allData.filter(a => {
      if (hideNogo && a.nogo === 1) return false;
      if (prixMin  != null && (a.prix       == null || a.prix       < prixMin))  return false;
      if (prixMax  != null && (a.prix       == null || a.prix       > prixMax))  return false;
      if (surfMin  != null && (a.superficie == null || a.superficie < surfMin))  return false;
      if (surfMax  != null && (a.superficie == null || a.superficie > surfMax))  return false;
      if (pm2Min   != null && (a.prix_m2    == null || a.prix_m2    < pm2Min))   return false;
      if (pm2Max   != null && (a.prix_m2    == null || a.prix_m2    > pm2Max))   return false;
      if (trajetMaxMin != null && trajetToMin(a.trajet) > trajetMaxMin)          return false;
      if (noteMin  != null && (a.note == null || a.note < noteMin))              return false;
      if (!matchBool(fViab,  a.viabilise))                                       return false;
      if (!matchBool(fConst, a.partiellement_constructible))                     return false;
      if (!matchBool(fAgri,  a.partiellement_agricole))                          return false;
      if (fStatus && a.status !== fStatus)                                        return false;
      return true;
    });
  }

  // ── Sorting ──────────────────────────────────────────────────
  function getSorted(rows) {
    if (!sortCol) return rows;
    return [...rows].sort((a, b) => {
      let va = a[sortCol], vb = b[sortCol];
      if (sortCol === "trajet") { va = trajetToMin(va); vb = trajetToMin(vb); }
      if (va == null) return 1;
      if (vb == null) return -1;
      if (typeof va === "string") return sortDir * va.localeCompare(vb, "fr");
      return sortDir * (va - vb);
    });
  }

  // ── Render ───────────────────────────────────────────────────
  function render() {
    const filtered = getSorted(getFiltered());
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    document.getElementById("emptyState").style.display = filtered.length ? "none" : "block";
    document.getElementById("counter").textContent =
      `${filtered.length} / ${allData.length} annonces`;

    filtered.forEach(a => {
      const tr = document.createElement("tr");
      tr.dataset.id = a.id;
      if (a.nogo === 1) tr.classList.add("nogo-row");

      tr.innerHTML = `
        <td class="sel-cell"><input type="checkbox" class="row-cb" /></td>
        <td>${statusBadge(a.status)}</td>
        <td>${fmtDate(a.first_seen)}</td>
        <td>${fmtDate(a.date_publication)}</td>
        <td class="titre-cell" title="${escHtml(a.titre || "")}">${escHtml(a.titre || "—")}</td>
        <td>${a.prix != null ? fmt(a.prix) + "\u00a0€" : "—"}</td>
        <td>${a.superficie != null ? fmt(a.superficie) + "\u00a0m²" : "—"}</td>
        <td>${a.prix_m2 != null ? fmt(a.prix_m2, 0) + "\u00a0€/m²" : "—"}</td>
        <td>${a.trajet || "—"}</td>
        <td>${badge(a.viabilise)}</td>
        <td>${badge(a.partiellement_constructible)}</td>
        <td>${badge(a.partiellement_agricole)}</td>
        <td>${a.emprise_sol != null ? fmt(a.emprise_sol, 1) + "%" : "—"}</td>
        <td class="note-cell" data-id="${a.id}">${renderNote(a.note)}</td>
        <td class="nogo-cell">${badge(a.nogo)}</td>
        <td class="lien-cell">${a.lien ? `<a href="${escHtml(a.lien)}" target="_blank" rel="noopener">Ouvrir ↗</a>` : "—"}</td>
        <td>${a.history_count > 0
          ? `<button class="hist-btn" data-id="${a.id}">📋 ${a.history_count}</button>`
          : "—"
        }</td>
      `;
      tbody.appendChild(tr);
    });

    bindRowEvents();
    updateToolbar();
  }

  function renderNote(note) {
    if (note == null) return `<span class="note-empty">—</span>`;
    return `<span class="note-val">${note}</span>`;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;")
      .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // ── Row events (note inline edit + nogo checkbox) ────────────
  function bindRowEvents() {
    // Note: click to edit inline
    document.querySelectorAll(".note-cell").forEach(td => {
      td.addEventListener("click", () => startNoteEdit(td));
    });

    // Row checkbox
    document.querySelectorAll(".row-cb").forEach(cb => {
      cb.addEventListener("change", () => {
        cb.closest("tr").classList.toggle("selected", cb.checked);
        updateToolbar();
      });
    });

    // History trigger
    document.querySelectorAll(".hist-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        e.stopPropagation();
        openHistoryModal(parseInt(btn.dataset.id));
      });
    });
  }

  function startNoteEdit(td) {
    if (td.querySelector(".note-input")) return; // already editing
    const id = parseInt(td.dataset.id);
    const a = allData.find(x => x.id === id);
    const current = a ? a.note : null;
    td.innerHTML = `<input class="note-input" type="number" min="1" max="10" value="${current ?? ""}" />`;
    const inp = td.querySelector(".note-input");
    inp.focus();
    inp.select();

    const save = async () => {
      const rawVal = inp.value.trim();
      const newNote = rawVal === "" ? null : parseInt(rawVal);
      if (newNote !== null && (isNaN(newNote) || newNote < 1 || newNote > 10)) {
        td.innerHTML = renderNote(current); return;
      }
      if (newNote !== current) {
        await patchOne(id, { note: newNote });
        if (a) a.note = newNote;
      }
      td.innerHTML = renderNote(newNote ?? current);
      bindRowEvents(); // rebind after DOM change
    };

    inp.addEventListener("blur", save);
    inp.addEventListener("keydown", e => {
      if (e.key === "Enter") { e.preventDefault(); inp.blur(); }
      if (e.key === "Escape") { td.innerHTML = renderNote(current); bindRowEvents(); }
    });
  }

  // ── History modal ─────────────────────────────────────────────
  async function openHistoryModal(id) {
    const ann = allData.find(x => x.id === id);
    document.getElementById("modalTitle").textContent =
      ann ? `Historique — ${ann.titre || "annonce #" + id}` : `Historique #${id}`;
    document.getElementById("modalBody").innerHTML = "<p>Chargement…</p>";
    document.getElementById("historyModal").style.display = "flex";

    let snapshots;
    try {
      const res = await fetch(`/api/annonces/${id}/history`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      snapshots = await res.json();
    } catch (err) {
      document.getElementById("modalBody").innerHTML = "<p>Erreur lors du chargement de l'historique.</p>";
      return;
    }

    if (!Array.isArray(snapshots) || snapshots.length === 0) {
      document.getElementById("modalBody").innerHTML = "<p>Pas d'historique pour cette annonce.</p>";
      return;
    }

    const COLS = [
      { key: "scraped_at", label: "Date snapshot" },
      { key: "status",     label: "Statut" },
      { key: "prix",       label: "Prix €" },
      { key: "titre",      label: "Titre" },
      { key: "list_id",    label: "ID annonce" },
      { key: "superficie", label: "Superficie m²" },
      { key: "prix_m2",    label: "€/m²" },
    ];

    let html = '<table class="history-table"><thead><tr>';
    COLS.forEach(c => { html += `<th>${c.label}</th>`; });
    html += "</tr></thead><tbody>";

    snapshots.forEach((snap, i) => {
      const prev = i > 0 ? snapshots[i - 1] : null;
      html += "<tr>";
      COLS.forEach(c => {
        const val = snap[c.key];
        const changed = prev !== null && String(prev[c.key]) !== String(val);
        const cls = changed ? ' class="cell-changed"' : "";
        let display;
        if (c.key === "scraped_at") {
          display = fmtDateTime(val);
        } else if (c.key === "prix" || c.key === "prix_m2") {
          display = val != null ? fmt(val, 0) : "—";
        } else {
          display = val != null ? escHtml(String(val)) : "—";
        }
        html += `<td${cls}>${display}</td>`;
      });
      html += "</tr>";
    });

    html += "</tbody></table>";
    document.getElementById("modalBody").innerHTML = html;
  }

  function closeModal() {
    document.getElementById("historyModal").style.display = "none";
    document.getElementById("modalBody").innerHTML = "";
  }

  // ── API calls ────────────────────────────────────────────────
  async function patchOne(id, fields) {
    await fetch(`/api/annonces/${id}`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(fields),
    });
  }

  async function patchBulk(ids, field, value) {
    await fetch("/api/annonces/bulk", {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ids, field, value }),
    });
  }

  async function deleteIds(ids) {
    await fetch("/api/annonces", {
      method: "DELETE",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ids }),
    });
  }

  // ── Selection helpers ────────────────────────────────────────
  function selectedIds() {
    return [...document.querySelectorAll(".row-cb:checked")]
      .map(cb => parseInt(cb.closest("tr").dataset.id));
  }

  function updateToolbar() {
    const ids = selectedIds();
    const tb = document.getElementById("toolbar");
    if (ids.length > 0) {
      tb.classList.add("visible");
      document.getElementById("selCount").textContent =
        `${ids.length} sélectionnée${ids.length > 1 ? "s" : ""}`;
    } else {
      tb.classList.remove("visible");
    }
  }

  // ── Bulk actions ─────────────────────────────────────────────
  document.getElementById("btnDelete").addEventListener("click", async () => {
    const ids = selectedIds();
    if (!ids.length) return;
    if (!confirm(`Supprimer ${ids.length} annonce${ids.length > 1 ? "s" : ""} définitivement ?`)) return;
    await deleteIds(ids);
    allData = allData.filter(a => !ids.includes(a.id));
    render();
  });

  document.getElementById("btnOpenLinks").addEventListener("click", () => {
    const ids = selectedIds();
    ids.forEach(id => {
      const a = allData.find(x => x.id === id);
      if (a?.lien) window.open(a.lien, "_blank", "noopener");
    });
  });

  function checkedToggleCols() {
    return [...document.querySelectorAll(".toggle-col:checked")].map(cb => cb.value);
  }

  async function applyToggle(value) {
    const ids = selectedIds();
    const fields = checkedToggleCols();
    if (!ids.length || !fields.length) {
      if (!fields.length) alert("Cochez au moins une colonne à modifier.");
      return;
    }
    await Promise.all(fields.map(field => patchBulk(ids, field, value)));
    ids.forEach(id => {
      const a = allData.find(x => x.id === id);
      if (a) fields.forEach(f => a[f] = value);
    });
    render();
  }

  document.getElementById("btnToggleOn").addEventListener("click", () => applyToggle(1));
  document.getElementById("btnToggleOff").addEventListener("click", () => applyToggle(0));

  // ── Select all ───────────────────────────────────────────────
  document.getElementById("selectAll").addEventListener("change", function () {
    document.querySelectorAll(".row-cb").forEach(cb => {
      cb.checked = this.checked;
      cb.closest("tr").classList.toggle("selected", this.checked);
    });
    updateToolbar();
  });

  // ── Sort ─────────────────────────────────────────────────────
  document.querySelectorAll("thead th.sortable").forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      if (sortCol === col) sortDir *= -1;
      else { sortCol = col; sortDir = 1; }
      document.querySelectorAll("thead th").forEach(t => {
        t.classList.remove("sorted-asc", "sorted-desc");
      });
      th.classList.add(sortDir === 1 ? "sorted-asc" : "sorted-desc");
      render();
    });
  });

  // ── Filters ──────────────────────────────────────────────────
  ["hideNogo","fPrixMin","fPrixMax","fSurfMin","fSurfMax","fPm2Min","fPm2Max","fTrajetMax","fNoteMin"]
    .forEach(id => document.getElementById(id).addEventListener("input", render));
  ["hideNogo","fViabilise","fConstruct","fAgricole","fStatus"].forEach(id =>
    document.getElementById(id).addEventListener("change", render));

  document.getElementById("resetFilters").addEventListener("click", () => {
    ["fPrixMin","fPrixMax","fSurfMin","fSurfMax","fPm2Min","fPm2Max","fTrajetMax","fNoteMin"]
      .forEach(id => document.getElementById(id).value = "");
    ["fViabilise","fConstruct","fAgricole","fStatus"]
      .forEach(id => document.getElementById(id).value = "");
    document.getElementById("hideNogo").checked = false;
    render();
  });

  // ── Modal close handlers (bound once at init) ────────────────
  document.getElementById("modalClose").addEventListener("click", closeModal);
  document.getElementById("historyModal").addEventListener("click", function(e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeModal();
  });

  // ── Init ─────────────────────────────────────────────────────
  loadData();
</script>
</body>
</html>
